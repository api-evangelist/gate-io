aid: gate-io
name: Gate.io
description: >-
  Gate.io is a pioneering cryptocurrency exchange serving over 23 million users
  globally since 2013. Its Gate API v4 provides REST and WebSocket interfaces
  for spot, margin, futures, options, and perpetual contract trading, as well as
  wallet management, earn products, sub-account operations, and comprehensive
  market data. SDKs are available in Python, Node.js, Java, Go, PHP, C#, and
  JavaScript, all generated from an OpenAPI specification.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/gate-io/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Cryptocurrency
  - Exchange
  - Trading
  - Spot Trading
  - Margin Trading
  - Futures
  - Options
  - WebSocket
  - Market Data
  - Wallet

apis:

  - name: Gate API v4 — Spot & Margin
    description: >-
      Public and authenticated REST endpoints for spot and margin trading,
      including order placement, cancellation, order-book queries, trade
      history, and account balance management.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.gate.com/docs/developers/apiv4/en/
    baseURL: https://api.gateio.ws/api/v4
    tags:
      - Spot Trading
      - Margin Trading
      - Orders
    properties:
      - type: Documentation
        url: https://www.gate.com/docs/developers/apiv4/en/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/gateio/rest-v4/master/swagger.json

  - name: Gate API v4 — Futures & Perpetuals
    description: >-
      REST and WebSocket interfaces for linear and inverse perpetual futures
      contracts, including order management, position tracking, funding rates,
      and settlement data.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.gate.com/docs/developers/apiv4/en/
    baseURL: https://api.gateio.ws/api/v4
    tags:
      - Futures
      - Perpetuals
      - Derivatives
    properties:
      - type: Documentation
        url: https://www.gate.com/docs/developers/apiv4/en/

  - name: Gate API v4 — Options
    description: >-
      REST endpoints for options trading, including querying available contracts,
      placing and managing options orders, and retrieving settlement and Greeks
      data.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.gate.com/docs/developers/apiv4/en/
    baseURL: https://api.gateio.ws/api/v4
    tags:
      - Options
      - Derivatives
    properties:
      - type: Documentation
        url: https://www.gate.com/docs/developers/apiv4/en/

  - name: Gate API v4 — Wallet & Account
    description: >-
      Endpoints for deposit and withdrawal management, transfer between
      sub-accounts and trading accounts, currency information, and fee schedules.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.gate.com/docs/developers/apiv4/en/
    baseURL: https://api.gateio.ws/api/v4
    tags:
      - Wallet
      - Accounts
      - Withdrawals
      - Deposits
    properties:
      - type: Documentation
        url: https://www.gate.com/docs/developers/apiv4/en/

  - name: Gate WebSocket API v4
    description: >-
      Real-time WebSocket streams for market data (order books, trades, tickers,
      candlesticks) and private channels for order updates, balance changes, and
      position events across spot, futures, and options markets.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.gate.com/docs/developers/apiv4/en/
    baseURL: wss://api.gateio.ws/ws/v4/
    tags:
      - WebSocket
      - Real-Time
      - Market Data
      - Streaming
    properties:
      - type: Documentation
        url: https://www.gate.com/docs/developers/apiv4/en/
      - type: GitHubRepository
        url: https://github.com/gateio/gatews

